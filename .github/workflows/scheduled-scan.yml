name: Scheduled Scanner

on:
  schedule:
    - cron: "*/5 13-22 * * 1-5"
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Send a test SMS without scanning"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: option-beacon-scheduled-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore previous scanner data
        run: |
          git fetch origin scanner-data --depth=1 || true
          git show origin/scanner-data:high_score_history.csv > high_score_history.csv || true

      - name: Run scanner
        run: python scheduled_scan.py
        env:
          OPTION_BEACON_TEST_ALERT: ${{ inputs.send_test_alert }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          ALERT_TO_PHONE_NUMBER: ${{ secrets.ALERT_TO_PHONE_NUMBER }}

      - name: Publish scanner data
        run: |
          if [[ -f latest_results.json ]]; then
            mkdir -p /tmp/option-beacon-scanner-data
            cp latest_results.json /tmp/option-beacon-scanner-data/latest_results.json
            cp high_score_history.csv /tmp/option-beacon-scanner-data/high_score_history.csv || true

            git config user.name "option-beacon-scanner"
            git config user.email "actions@github.com"
            git switch --orphan scanner-data
            git rm -rf . >/dev/null 2>&1 || true
            cp /tmp/option-beacon-scanner-data/* .
            touch high_score_history.csv
            git add -f latest_results.json high_score_history.csv
            git commit -m "Update scheduled scanner data"
            git push -f origin scanner-data
          else
            echo "No scanner data generated."
          fi
